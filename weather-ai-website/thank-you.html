<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Weather AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a6bb3 0%, #00c9ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .thank-you-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .btn-back {
            background: linear-gradient(135deg, #1a6bb3 0%, #00c9ff 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(26, 107, 179, 0.3);
            color: white;
        }
    </style>
    <style>
        html { font-size: 14px !important; }
        body {
            font-size: 0.95rem !important;
            overflow-x: hidden !important;
        }
        @supports (zoom: 1) {
            body { zoom: 0.95 !important; }
        }
        @supports not (zoom: 1) {
            body {
                transform: scale(0.95) !important;
                transform-origin: top center !important;
                width: 100% !important;
            }
        }
    </style>
</head>
<body>
    <div class="thank-you-card">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="display-4 fw-bold text-primary mb-3">Thank You!</h1>
        <h3 class="mb-4">Your message has been sent successfully.</h3>
        <p class="lead mb-4">
            We've received your message and will get back to you within 24 hours.
            A confirmation email has been sent to your email address.
        </p>
        <div class="alert alert-info mb-4">
            <i class="fas fa-envelope me-2"></i>
            <strong>Check your email:</strong> saadyousafzai420@gmail.com
        </div>
        <a href="contact.html" class="btn-back">
            <i class="fas fa-arrow-left me-2"></i>Back to Contact Page
        </a>
    </div>
</body>
</html>
