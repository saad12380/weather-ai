services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: weather-ai-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-weather_ai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_password}
      POSTGRES_DB: ${DB_NAME:-weather_ai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-weather_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather-ai-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: weather-ai-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather-ai-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # FastAPI Backend (Serves API + Website + Dashboard)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: weather-ai-backend
    entrypoint: []
    command: uvicorn main:app --host 0.0.0.0 --port 3000
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      WEBSITE_URL: ${WEBSITE_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:3000/api}
      SECRET_KEY: ${SECRET_KEY:-change_this_secret_key}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change_this_session_secret}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      HTTPS_ENABLED: ${HTTPS_ENABLED:-false}
    ports:
      - "3000:3000"
    volumes:
      - ./backend/models:/app/models
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./weather-ai-website:/app/weather-ai-website:ro
      - ./frontend:/app/frontend:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - weather-ai-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: weather-ai-nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./weather-ai-website:/usr/share/nginx/html/website:ro
      - ./frontend:/usr/share/nginx/html/dashboard:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - weather-ai-network
    restart: unless-stopped

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: weather-ai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - backend
    networks:
      - weather-ai-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: weather-ai-grafana
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - weather-ai-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  weather-ai-network:
    driver: bridge