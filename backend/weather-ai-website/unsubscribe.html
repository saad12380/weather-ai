<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe - Weather AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .unsubscribe-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
        .success-icon {
            color: #28a745;
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .error-icon {
            color: #dc3545;
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
    <style>
        html { font-size: 14px !important; }
        body {
            font-size: 0.95rem !important;
            overflow-x: hidden !important;
        }
        @supports (zoom: 1) {
            body { zoom: 0.95 !important; }
        }
        @supports not (zoom: 1) {
            body {
                transform: scale(0.95) !important;
                transform-origin: top center !important;
                width: 100% !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="unsubscribe-card text-center" id="status-card">
            <div id="loading">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Processing your request...</p>
            </div>
            <div id="success" style="display: none;">
                <div class="success-icon">✓</div>
                <h2>Successfully Unsubscribed</h2>
                <p class="text-muted">You've been removed from our newsletter. We're sorry to see you go!</p>
                <a href="/" class="btn btn-primary mt-3">Return to Home</a>
            </div>
            <div id="error" style="display: none;">
                <div class="error-icon">✗</div>
                <h2>Unsubscribe Failed</h2>
                <p class="text-muted">The unsubscribe link is invalid or expired.</p>
                <a href="/" class="btn btn-primary mt-3">Return to Home</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`/api/newsletter/unsubscribe?token=${token}`);
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (data.success) {
                    document.getElementById('success').style.display = 'block';
                } else {
                    document.getElementById('error').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
