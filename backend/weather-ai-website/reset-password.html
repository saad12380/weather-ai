<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Weather AI Platform</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Reset your Weather AI account password. Enter your new password to regain access to your weather anomaly detection dashboard.">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌤️</text></svg>">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1a6bb3;
            --secondary-color: #0a2540;
            --accent-color: #00c9ff;
            --light-bg: #f8fafc;
            --dark-bg: #0f172a;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --gradient-primary: linear-gradient(135deg, #1a6bb3 0%, #00c9ff 100%);
            --gradient-dark: linear-gradient(135deg, #0a2540 0%, #1e293b 100%);
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.15);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background: var(--light-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .reset-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
        }
        
        .reset-card {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .reset-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
            box-shadow: var(--shadow-md);
        }
        
        .text-gradient {
            background: linear-gradient(to right, #00c9ff, #92fe9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-dark);
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(26, 107, 179, 0.1);
        }
        
        .input-group {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
        }
        
        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            margin-top: 1rem;
            padding: 14px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            border-radius: 10px;
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            font-size: 0.875rem;
            margin-top: 5px;
            min-height: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .message.error {
            color: #ef4444;
        }
        
        .message.success {
            color: #10b981;
        }
        
        /* Password Strength */
        .password-strength {
            margin-top: 10px;
        }
        
        .strength-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            background: var(--gradient-primary);
        }
        
        .strength-text {
            font-size: 0.875rem;
            color: var(--text-light);
        }
        
        .back-to-login {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.875rem;
        }
        
        .back-to-login:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
    <style>
        html { font-size: 14px !important; }
        body {
            font-size: 0.95rem !important;
            overflow-x: hidden !important;
        }
        @supports (zoom: 1) {
            body { zoom: 0.95 !important; }
        }
        @supports not (zoom: 1) {
            body {
                transform: scale(0.95) !important;
                transform-origin: top center !important;
                width: 100% !important;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-header">
                <div class="reset-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h2 class="fw-bold mb-2">Reset Your Password</h2>
                <p class="text-muted">Enter your new password below</p>
            </div>
            
            <!-- Alert Message (hidden by default) -->
            <div id="alertMessage" class="alert" style="display: none;"></div>
            
            <!-- Password Reset Form -->
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required>
                        <button type="button" class="toggle-password" data-input="newPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="passwordStrengthFill"></div>
                        </div>
                        <div class="strength-text" id="passwordStrengthText">Password strength: None</div>
                    </div>
                    <div class="message" id="newPasswordMessage"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password" required>
                        <button type="button" class="toggle-password" data-input="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="message" id="confirmPasswordMessage"></div>
                </div>
                
                <button type="submit" class="btn btn-primary" id="resetSubmit">
                    <i class="fas fa-sync-alt me-2"></i>Reset Password
                </button>
            </form>
            
            <a href="/login" class="back-to-login">
                <i class="fas fa-arrow-left me-2"></i>Back to Login
            </a>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // API Configuration
        const API_BASE_URL = 'http://localhost:3000';
        
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        
        console.log('Reset token from URL:', resetToken ? 'Present' : 'Missing');
        
        // Check if token exists
        if (!resetToken) {
            showAlert('Invalid or missing reset token. Please request a new password reset link.', 'error');
            document.getElementById('resetPasswordForm').style.display = 'none';
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            // Set up password toggles
            setupPasswordToggles();
            
            // Set up password strength meter
            setupPasswordStrength();
            
            // Set up form submission
            document.getElementById('resetPasswordForm').addEventListener('submit', handleResetPassword);
        });
        
        function setupPasswordToggles() {
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', function() {
                    const inputId = this.dataset.input;
                    const input = document.getElementById(inputId);
                    const icon = this.querySelector('i');
                    
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
        }
        
        function setupPasswordStrength() {
            const passwordInput = document.getElementById('newPassword');
            const strengthFill = document.getElementById('passwordStrengthFill');
            const strengthText = document.getElementById('passwordStrengthText');
            
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                const strength = checkPasswordStrength(password);
                
                strengthFill.style.width = `${strength.width}%`;
                strengthFill.style.background = strength.color;
                strengthText.textContent = strength.text;
                strengthText.style.color = strength.color;
            });
        }
        
        function checkPasswordStrength(password) {
            let strength = 0;
            let text = '';
            let color = '';
            
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            switch(strength) {
                case 0:
                case 1:
                    text = 'Very Weak';
                    color = '#ef4444';
                    break;
                case 2:
                    text = 'Weak';
                    color = '#f97316';
                    break;
                case 3:
                    text = 'Fair';
                    color = '#eab308';
                    break;
                case 4:
                    text = 'Good';
                    color = '#3b82f6';
                    break;
                case 5:
                    text = 'Strong';
                    color = '#10b981';
                    break;
            }
            
            return {
                strength: strength,
                text: `Password strength: ${text}`,
                color: color,
                width: (strength / 5) * 100
            };
        }
        
        async function handleResetPassword(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            
            // Clear previous messages
            clearMessages();
            
            // Validate
            if (!newPassword || !confirmPassword) {
                showMessage('newPasswordMessage', 'Please fill in both password fields', 'error');
                return;
            }
            
            if (newPassword.length < 8) {
                showMessage('newPasswordMessage', 'Password must be at least 8 characters long', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('confirmPasswordMessage', 'Passwords do not match', 'error');
                return;
            }
            
            if (!resetToken) {
                showAlert('Reset token is missing. Please request a new password reset link.', 'error');
                return;
            }
            
            // Show loading
            const submitBtn = document.getElementById('resetSubmit');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Resetting...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/reset-password/confirm`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Hide form and show success message
                    document.getElementById('resetPasswordForm').style.display = 'none';
                    showAlert('Your password has been reset successfully! You can now login with your new password.', 'success');
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showAlert(data.detail || 'Failed to reset password. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showAlert('Network error. Please check your connection and try again.', 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }
        
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
                element.className = `message ${type}`;
            }
        }
        
        function clearMessages() {
            document.querySelectorAll('.message').forEach(msg => {
                msg.textContent = '';
                msg.className = 'message';
            });
        }
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
        }
    </script>
</body>
</html>
